<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>미래 폭염계단</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #20113f; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; }

    #gameWrap {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(177.78vw, 100vh);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 18px;
      border: 5px solid #fff7d6;
      touch-action: none;
      background: linear-gradient(180deg, #ff7a18 0%, #ffb703 18%, #7dd3fc 45%, #bae6fd 68%, #fde68a 100%);
      box-shadow: 0 24px 60px rgba(0,0,0,.38);
    }
    #gameWrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0 2px, transparent 2px 4px), repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 2px, transparent 2px 30px);
      opacity: .22;
    }
    #gameWrap.stage-ground { background: linear-gradient(180deg, #ff7a18 0%, #ffb703 20%, #7dd3fc 50%, #d9f99d 78%, #86efac 100%); }
    #gameWrap.stage-sky { background: linear-gradient(180deg, #f97316 0%, #facc15 18%, #38bdf8 45%, #7dd3fc 100%); }
    #gameWrap.stage-space { background: linear-gradient(180deg, #111827 0%, #312e81 45%, #581c87 100%); }

    #decorLayer { position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .decor { position: absolute; filter: drop-shadow(3px 3px 0 rgba(63,47,37,.18)); }
    .sun { width: 76px; height: 76px; background: #fef08a; border: 5px solid #3f2f25; border-radius: 0; box-shadow: 0 0 0 8px rgba(254,240,138,.35); }
    .sun::before { content: ""; position: absolute; inset: -18px; background: repeating-conic-gradient(from 0deg, transparent 0 12deg, rgba(254,240,138,.75) 12deg 22deg); z-index: -1; }
    .cloud { width: 72px; height: 28px; background: #fff7d6; border: 4px solid #3f2f25; box-shadow: 22px -10px 0 #fff7d6, 44px 0 0 #fff7d6; }
    .heatText { padding: 8px 10px; background: #ef4444; color: #fff7d6; border: 4px solid #3f2f25; font-weight: 900; font-size: 18px; box-shadow: 4px 4px 0 rgba(63,47,37,.24); }
    .star { width: 10px; height: 10px; background: #fef08a; box-shadow: 22px 24px 0 #e0f2fe, -22px 12px 0 #fff7d6, 44px -8px 0 #fef3c7; }

    #hud { position: absolute; top: 12px; left: 12px; right: 12px; z-index: 40; display: flex; justify-content: space-between; gap: 8px; font-weight: 900; }
    #soundControls {
      position: absolute;
      top: 88px;
      right: 12px;
      z-index: 45;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .soundBtn {
      background: #fff7d6;
      color: #3f2f25;
      border: 3px solid #3f2f25;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 900;
      width: auto;
      min-width: 86px;
      margin: 0;
      box-shadow: 3px 3px 0 rgba(63,47,37,.18);
    }
    .hudBox { background: #fff7d6; border: 4px solid #3f2f25; padding: 7px 9px; color: #3f2f25; font-size: 13px; line-height: 1.35; box-shadow: 4px 4px 0 rgba(63,47,37,.22); }
    #score, #time { color: #ef4444; font-size: 16px; }
    #boosterText { color: #0f766e; text-align: right; max-width: 150px; }

    #gameArea { position: absolute; inset: 0; overflow: hidden; z-index: 3; }
    #world { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 5; will-change: transform; }
    .step { position: absolute; width: 112px; height: 36px; border-radius: 0; background: #facc15; border: 4px solid #3f2f25; box-shadow: 0 7px 0 #b45309, 4px 11px 0 rgba(63,47,37,.20); z-index: 6; }
    .step::before { content: ""; position: absolute; left: 8px; top: 6px; width: 24px; height: 6px; background: rgba(255,255,255,.55); }
    .step::after { content: ""; position: absolute; right: 8px; bottom: 5px; width: 16px; height: 5px; background: rgba(180,83,9,.4); }
    .step.current { outline: 4px solid #fff7d6; outline-offset: 4px; }
    .step.bonus { background: #86efac; box-shadow: 0 7px 0 #15803d, 4px 11px 0 rgba(63,47,37,.18); }
    .step.bonus .bonusIcon { position: absolute; right: -10px; top: -34px; font-size: 28px; filter: drop-shadow(2px 2px 0 rgba(63,47,37,.3)); }

    #player { position: absolute; width: 92px; height: 92px; object-fit: contain; z-index: 22; transform: translate(-50%, -100%); filter: drop-shadow(3px 0 0 #fff7d6) drop-shadow(-3px 0 0 #fff7d6) drop-shadow(0 3px 0 #fff7d6) drop-shadow(0 9px 0 rgba(63,47,37,.22)); will-change: left, top, transform; }
    .invincible { animation: shieldBlink .18s infinite alternate; }
    @keyframes shieldBlink { from { opacity: .65; } to { opacity: 1; filter: drop-shadow(0 0 18px #34d399); } }

    #timerBarWrap { position: absolute; left: 20px; right: 20px; bottom: 20px; height: 16px; background: #fff7d6; border: 4px solid #3f2f25; overflow: hidden; z-index: 32; box-shadow: 4px 4px 0 rgba(63,47,37,.22); }
    #timerBar { width: 100%; height: 100%; background: linear-gradient(90deg, #22c55e, #facc15, #fb7185); transform-origin: left center; }
    #touchGuide { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 32; font-size: 12px; font-weight: 900; background: #fff7d6; color: #3f2f25; padding: 7px 10px; white-space: nowrap; border: 4px solid #3f2f25; box-shadow: 4px 4px 0 rgba(63,47,37,.22); }
    #toast { position: absolute; z-index: 45; top: 84px; left: 50%; transform: translateX(-50%); padding: 9px 12px; background: #fff7d6; color: #ef4444; font-weight: 900; text-align: center; min-width: 170px; pointer-events: none; border: 4px solid #3f2f25; box-shadow: 4px 4px 0 rgba(63,47,37,.22); }

    .overlay { position: absolute; inset: 0; z-index: 60; background: rgba(27,16,51,.55); display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(6px); }
    .hidden { display: none !important; }
    .panel { width: 100%; max-width: 360px; background: #fff7d6; color: #3f2f25; padding: 22px; text-align: center; box-shadow: 8px 8px 0 rgba(63,47,37,.28); border: 5px solid #3f2f25; }
    .panel h1, .panel h2 { margin: 0 0 12px; line-height: 1.2; color: #ef4444; }
    .panel p { margin: 8px 0 16px; color: #3f2f25; line-height: 1.55; font-size: 14px; font-weight: 750; }
    button { border: 4px solid #3f2f25; border-radius: 0; padding: 13px 16px; font-size: 16px; font-weight: 900; cursor: pointer; color: #3f2f25; background: #86efac; box-shadow: 4px 4px 0 rgba(63,47,37,.25); width: 100%; margin-top: 8px; }
    .choiceBtn { background: #ffffff; color: #3f2f25; box-shadow: 3px 3px 0 rgba(63,47,37,.18); border: 3px solid #3f2f25; text-align: left; margin-top: 8px; }
    input { width: 100%; padding: 11px; border: 3px solid #3f2f25; font-weight: 900; font-size: 14px; margin-top: 8px; background: #fff; color: #3f2f25; }
    .choiceBtn:active, button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 rgba(63,47,37,.2); }
  </style>
</head>
<body>
  <div id="gameWrap" class="stage-ground">
    <div id="decorLayer"></div>
    <div id="hud">
      <div class="hudBox">점수 <span id="score">0</span><br />생존 <span id="time">0</span>초</div>
      <div class="hudBox" id="boosterText">부스터 없음</div>
    </div>
    <div id="gameArea">
      <div id="world"></div>
      <img id="player" src="assets/mirae.png" alt="미래 캐릭터" />
    </div>
    <div id="touchGuide">왼쪽 / 오른쪽 화면 터치!</div>
    <div id="timerBarWrap"><div id="timerBar"></div></div>
    <div id="toast" class="hidden"></div>

    <div id="soundControls">
      <button id="bgmToggle" class="soundBtn" type="button">🎵 BGM ON</button>
      <button id="sfxToggle" class="soundBtn" type="button">🔔 SFX ON</button>
    </div>

    <div id="startOverlay" class="overlay">
      <div class="panel">
        <h1>미래 폭염계단</h1>
        <p>쨍쨍한 폭염을 피해 건강계단을 올라가요! 안전모 발판은 보너스, 20초마다 폭염 퀴즈를 맞히면 부스터를 얻어요.</p>
        <button id="startBtn" type="button">START</button>
      </div>
    </div>

    <div id="quizOverlay" class="overlay hidden">
      <div class="panel">
        <h2 id="quizTitle">폭염 퀴즈</h2>
        <p id="quizQuestion"></p>
        <div id="choices"></div>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
      <div class="panel">
        <h2>GAME OVER</h2>
        <p id="finalText"></p>
        <div id="rankingBox" style="text-align:left; margin:12px 0; font-weight:900; line-height:1.55; font-size:14px;">🏆 랭킹 준비 중...</div>
        <input id="nicknameInput" maxlength="8" placeholder="닉네임(랭킹 공개)" />
        <input id="employeeInput" maxlength="12" placeholder="사번(관리자 확인용/비공개)" />
        <button id="saveScoreBtn" type="button">기록하기</button>
        <button id="restartBtn" type="button">RETRY</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var SUPABASE_URL = "https://efdvamzvbaazajcleasa.supabase.co";
      var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmZHZhbXp2YmFhemFqY2xlYXNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDcxNDgsImV4cCI6MjA5NDQyMzE0OH0.rJlBtts7lKC9VwZ7HLxrn1xOk8BXpsw1hvTl5HWCcRg";
      var GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxPIFd_FeqGJQEz0MBxEcWVT10eeR4n9ZCJqtWhPv5OYFAUx-I_aehPQoJkJ7WxZCpa/exec";
      var supabaseClient = null;

      var quizzes = [
        { question: "폭염 시 가장 중요한 행동은?", choices: ["수분섭취와 휴식", "참고 버티기", "두꺼운 옷 입기"], answer: 0 },
        { question: "체감온도 33℃ 이상이면?", choices: ["2시간마다 20분 휴식", "쉬지 않고 작업", "물을 마시지 않기"], answer: 0 },
        { question: "폭염 때 시원한 물은?", choices: ["충분히 자주 마신다", "하루 한 번만 마신다", "뜨거운 커피만 마신다"], answer: 0 },
        { question: "온열질환 의심 시 가장 먼저 할 일은?", choices: ["시원한 곳으로 이동", "더 오래 작업", "햇볕 아래 있기"], answer: 0 },
        { question: "폭염 작업 시 좋은 휴식 장소는?", choices: ["그늘 또는 시원한 곳", "뜨거운 바닥", "직사광선 아래"], answer: 0 },
        { question: "폭염 예방에 도움이 되는 것은?", choices: ["보냉장구 착용", "두꺼운 담요", "밀폐된 공간"], answer: 0 },
        { question: "체감온도 35℃ 이상 폭염경보 때 권고되는 것은?", choices: ["무더위 시간대 옥외작업 중지", "가장 더울 때 작업하기", "휴식 줄이기"], answer: 0 },
        { question: "어지럽고 식은땀이 나면?", choices: ["즉시 쉬고 상태 확인", "더 빨리 움직이기", "물을 피하기"], answer: 0 },
        { question: "몸을 식히는 데 좋은 방법은?", choices: ["시원한 물과 그늘", "뜨거운 장소 이동", "햇볕 오래 쬐기"], answer: 0 },
        { question: "체감온도 38℃ 이상이면?", choices: ["긴급작업 외 옥외작업 중지", "휴식 없이 작업", "작업속도 높이기"], answer: 0 },
        { question: "동료가 온열질환으로 의식이 이상하면?", choices: ["119에 신고", "혼자 쉬게 두기", "운동을 시키기"], answer: 0 },
        { question: "폭염 시 갈증이 나기 전에도 해야 할 일은?", choices: ["물을 조금씩 자주 마시기", "물을 참기", "카페인만 마시기"], answer: 0 }
      ];

      var gameWrap = document.getElementById("gameWrap");
      var decorLayer = document.getElementById("decorLayer");
      var world = document.getElementById("world");
      var player = document.getElementById("player");
      var scoreEl = document.getElementById("score");
      var timeEl = document.getElementById("time");
      var boosterText = document.getElementById("boosterText");
      var toast = document.getElementById("toast");
      var timerBar = document.getElementById("timerBar");
      var startOverlay = document.getElementById("startOverlay");
      var quizOverlay = document.getElementById("quizOverlay");
      var gameOverOverlay = document.getElementById("gameOverOverlay");
      var quizTitle = document.getElementById("quizTitle");
      var quizQuestion = document.getElementById("quizQuestion");
      var choices = document.getElementById("choices");
      var finalText = document.getElementById("finalText");
      var startBtn = document.getElementById("startBtn");
      var restartBtn = document.getElementById("restartBtn");
      var rankingBox = document.getElementById("rankingBox");
      var nicknameInput = document.getElementById("nicknameInput");
      var employeeInput = document.getElementById("employeeInput");
      var saveScoreBtn = document.getElementById("saveScoreBtn");
      var bgmToggle = document.getElementById("bgmToggle");
      var sfxToggle = document.getElementById("sfxToggle");

      var running = false;
      var paused = false;
      var inputLocked = false;
      var moving = false;
      var score = 0;
      var seconds = 0;
      var currentIndex = 0;
      var cameraY = 0;
      var targetCameraY = 0;
      var revived = false;
      var booster = null;
      var boosterUntil = 0;
      var gameStartTime = 0;
      var lastQuizSecond = -1;
      var quizMode = "booster";
      var animationId = null;
      var steps = [];
      var playerPos = { x: 0, y: 0 };
      var playerStart = { x: 0, y: 0 };
      var playerTarget = { x: 0, y: 0 };
      var moveStartTime = 0;
      var moveDuration = 115;
      var stepDeadline = 0;
      var currentStage = "ground";
      var STEP_W = 112;
      var STEP_GAP_X = 76;
      var STEP_GAP_Y = 62;
      var PLAYER_BASE_RATIO = 0.68;
      var BASE_STEP_TIME = 3400;

      /************************************************************
       * 사운드 설정
       ************************************************************/
      var bgmEnabled = localStorage.getItem("mirae_bgm") !== "off";
      var sfxEnabled = localStorage.getItem("mirae_sfx") !== "off";

      var bgm = new Audio("assets/bgm.mp3");
      var jumpSound = new Audio("assets/jump.wav");
      var helmetSound = new Audio("assets/helmet.wav");
      var quizSound = new Audio("assets/quiz.wav");
      var gameOverSound = new Audio("assets/gameover.mp3");

      bgm.loop = true;
      bgm.volume = 0.35;

      jumpSound.volume = 0.45;
      helmetSound.volume = 0.5;
      quizSound.volume = 0.55;
      gameOverSound.volume = 0.6;

      function updateSoundButtons() {
        bgmToggle.textContent = bgmEnabled ? "🎵 BGM ON" : "🎵 BGM OFF";
        sfxToggle.textContent = sfxEnabled ? "🔔 SFX ON" : "🔔 SFX OFF";
      }

      function playSfx(sound) {
        if (!sfxEnabled || !sound) return;
        try {
          sound.currentTime = 0;
          sound.play();
        } catch (err) {
          console.error(err);
        }
      }

      function playBgm() {
        if (!bgmEnabled) return;
        try {
          bgm.currentTime = 0;
          bgm.play();
        } catch (err) {
          console.error(err);
        }
      }

      function stopBgm() {
        try {
          bgm.pause();
        } catch (err) {
          console.error(err);
        }
      }

      function toggleBgm(e) {
        e.stopPropagation();
        bgmEnabled = !bgmEnabled;
        localStorage.setItem("mirae_bgm", bgmEnabled ? "on" : "off");
        updateSoundButtons();
        if (bgmEnabled && running) playBgm();
        else stopBgm();
      }

      function toggleSfx(e) {
        e.stopPropagation();
        sfxEnabled = !sfxEnabled;
        localStorage.setItem("mirae_sfx", sfxEnabled ? "on" : "off");
        updateSoundButtons();
      }

      function initSupabase() {
        if (!window.supabase) return;
        if (SUPABASE_URL.indexOf("여기에_") !== -1 || SUPABASE_ANON_KEY.indexOf("여기에_") !== -1) return;
        try {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (err) {
          console.error("Supabase 초기화 오류:", err);
          supabaseClient = null;
        }
      }

      function wrapW() { return gameWrap.clientWidth || 360; }
      function wrapH() { return gameWrap.clientHeight || 640; }
      function isSupabaseReady() { return supabaseClient !== null; }
      function isGoogleSheetsReady() { return GOOGLE_SHEETS_WEBAPP_URL.indexOf("여기에_") === -1; }
      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function showToast(message, ms) {
        if (typeof ms !== "number") ms = 1200;
        toast.textContent = message;
        toast.classList.remove("hidden");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { toast.classList.add("hidden"); }, ms);
      }

      function updateHud() {
        scoreEl.textContent = String(Math.floor(score));
        timeEl.textContent = String(seconds);
        if (!booster) boosterText.textContent = "부스터 없음";
      }

      function addDecor(className, left, top, text) {
        var el = document.createElement("div");
        el.className = "decor " + className;
        el.style.left = left + "%";
        el.style.top = top + "%";
        if (text) el.textContent = text;
        decorLayer.appendChild(el);
      }

      function renderDecor(stage) {
        if (!decorLayer) return;
        decorLayer.innerHTML = "";
        if (stage === "space") {
          addDecor("star", 20, 18);
          addDecor("star", 62, 35);
          return;
        }
        addDecor("sun", 10, 9);
        addDecor("cloud", 60, 22);
        // 온도 배지는 화면을 깔끔하게 보이도록 제거
        if (stage === "sky") addDecor("cloud", 18, 42);
      }

      function updateStage() {
        var stage = score < 60 ? "ground" : score < 140 ? "sky" : "space";
        if (stage === currentStage) return;
        currentStage = stage;
        gameWrap.className = "stage-" + stage;
        renderDecor(stage);
        if (stage === "sky") showToast("하늘 구간 진입!", 1000);
        if (stage === "space") showToast("우주 구간 진입!", 1000);
      }

      function clearWorld() { world.innerHTML = ""; steps = []; }
      function clampX(x) { var margin = 70; return Math.max(margin, Math.min(wrapW() - margin, x)); }

      function makeStep(index, x, y, type) {
        var el = document.createElement("div");
        el.className = "step";
        if (type === "bonus") {
          el.className += " bonus";
          var icon = document.createElement("span");
          icon.className = "bonusIcon";
          icon.textContent = "⛑️";
          el.appendChild(icon);
        }
        el.style.left = (x - STEP_W / 2) + "px";
        el.style.top = y + "px";
        world.appendChild(el);
        steps[index] = { index: index, x: x, y: y, type: type, el: el, collected: false };
      }

      function appendNextStep(index) {
        var prev = steps[index - 1];
        var dir = Math.random() > 0.5 ? 1 : -1;
        var nextX = prev.x + dir * STEP_GAP_X;
        if (nextX < 70 || nextX > wrapW() - 70) nextX = prev.x - dir * STEP_GAP_X;
        makeStep(index, clampX(nextX), prev.y - STEP_GAP_Y, index > 6 && Math.random() < 0.18 ? "bonus" : "normal");
      }

      function generateMap() {
        var i;
        var x = wrapW() / 2;
        var y = Math.floor(wrapH() * PLAYER_BASE_RATIO);
        clearWorld();
        makeStep(0, x, y, "normal");
        for (i = 1; i < 420; i++) appendNextStep(i);
      }

      function ensureMoreSteps() {
        var i;
        var start;
        var end;
        if (currentIndex <= steps.length - 45) return;
        start = steps.length;
        end = start + 140;
        for (i = start; i < end; i++) appendNextStep(i);
      }

      function currentStep() { return steps[currentIndex]; }
      function nextStep() { return steps[currentIndex + 1]; }
      function getNextDirection() {
        var cur = currentStep();
        var nxt = nextStep();
        if (!cur || !nxt) return null;
        return nxt.x < cur.x ? "left" : "right";
      }
      function markCurrent() {
        steps.forEach(function (s) { if (s && s.el) s.el.classList.remove("current"); });
        if (steps[currentIndex]) steps[currentIndex].el.classList.add("current");
      }
      function renderWorld() { world.style.transform = "translateY(" + cameraY + "px)"; }
      function renderPlayer(extraScale, tilt) {
        if (typeof extraScale !== "number") extraScale = 1;
        if (typeof tilt !== "number") tilt = 0;
        player.style.left = playerPos.x + "px";
        player.style.top = (playerPos.y + cameraY) + "px";
        player.style.transform = "translate(-50%, -100%) scale(" + extraScale + ") rotate(" + tilt + "deg)";
      }
      function snapToCurrentStep() {
        var s = currentStep();
        if (!s) return;
        cameraY = wrapH() * PLAYER_BASE_RATIO - s.y;
        targetCameraY = cameraY;
        playerPos.x = s.x;
        playerPos.y = s.y;
        renderWorld();
        renderPlayer(1, 0);
        markCurrent();
      }
      function getStepTimeLimit() {
        var limit = BASE_STEP_TIME - Math.min(1300, score * 7);
        if (booster === "slow") limit += 1100;
        return Math.max(1600, limit);
      }
      function resetDeadline() { stepDeadline = performance.now() + getStepTimeLimit(); }

      async function loadRanking() {
        var result;
        var html;
        if (!rankingBox) return;
        if (!isSupabaseReady()) {
          rankingBox.innerHTML = "🏆 랭킹: Supabase 설정 필요";
          return;
        }
        rankingBox.innerHTML = "🏆 랭킹 불러오는 중...";
        result = await supabaseClient
          .from("scores")
          .select("nickname, score, created_at")
          .order("score", { ascending: false })
          .order("created_at", { ascending: true })
          .limit(5);
        if (result.error) {
          console.error(result.error);
          rankingBox.innerHTML = "🏆 랭킹 불러오기 실패";
          return;
        }
        if (!result.data || result.data.length === 0) {
          rankingBox.innerHTML = "🏆 아직 등록된 점수가 없어요";
          return;
        }
        html = "🏆 TOP 5<br>";
        result.data.forEach(function (row, index) {
          html += String(index + 1) + "위. " + escapeHtml(row.nickname) + " / " + String(row.score) + "점<br>";
        });
        rankingBox.innerHTML = html;
      }

      async function savePublicRanking(nickname, finalScore) {
        if (!isSupabaseReady()) return { ok: false, skipped: true };
        var result = await supabaseClient.from("scores").insert([{ nickname: nickname, score: finalScore }]);
        if (result.error) {
          console.error(result.error);
          return { ok: false };
        }
        return { ok: true };
      }

      async function saveAdminSheet(nickname, employeeId, finalScore, survivalSeconds) {
        if (!isGoogleSheetsReady()) return { ok: false, skipped: true };
        try {
          await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
              nickname: nickname,
              employee_id: employeeId,
              score: finalScore,
              survival_seconds: survivalSeconds,
              game: "미래 폭염계단",
              created_at: new Date().toISOString()
            })
          });
          return { ok: true };
        } catch (err) {
          console.error(err);
          return { ok: false };
        }
      }

      async function submitScoreRecord(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        var nickname = nicknameInput.value.trim().slice(0, 8);
        var employeeId = employeeInput.value.trim().slice(0, 12);
        var finalScore = Math.floor(score);
        var publicResult;
        var sheetResult;

        if (!nickname) { showToast("닉네임을 입력해줘!", 1200); return; }
        if (!employeeId) { showToast("사번을 입력해줘!", 1200); return; }

        saveScoreBtn.disabled = true;
        saveScoreBtn.textContent = "기록 중...";
        publicResult = await savePublicRanking(nickname, finalScore);
        sheetResult = await saveAdminSheet(nickname, employeeId, finalScore, seconds);

        if ((!publicResult.ok && !publicResult.skipped) || (!sheetResult.ok && !sheetResult.skipped)) {
          showToast("저장 실패!", 1400);
          saveScoreBtn.disabled = false;
          saveScoreBtn.textContent = "기록하기";
          return;
        }
        if (publicResult.skipped && sheetResult.skipped) {
          showToast("저장 설정 필요!", 1400);
          saveScoreBtn.disabled = false;
          saveScoreBtn.textContent = "기록하기";
          return;
        }
        saveScoreBtn.textContent = "기록 완료";
        showToast("기록 완료!", 1300);
        await loadRanking();
      }

      function resetGame() {
        if (animationId !== null) cancelAnimationFrame(animationId);
        playSfx(gameOverSound);
        stopBgm();
        running = true;
        paused = false;
        inputLocked = false;
        moving = false;
        score = 0;
        seconds = 0;
        revived = false;
        booster = null;
        boosterUntil = 0;
        gameStartTime = performance.now();
        lastQuizSecond = -1;
        currentIndex = 0;
        cameraY = 0;
        targetCameraY = 0;
        currentStage = "ground";
        gameWrap.className = "stage-ground";
        renderDecor("ground");
        player.classList.remove("invincible");
        timerBar.style.transform = "scaleX(1)";
        generateMap();
        snapToCurrentStep();
        resetDeadline();
        updateHud();
      }

      function isAnyOverlayOpen() {
        return !startOverlay.classList.contains("hidden") || !quizOverlay.classList.contains("hidden") || !gameOverOverlay.classList.contains("hidden");
      }

      function startGame(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        try {
          startOverlay.classList.add("hidden");
          gameOverOverlay.classList.add("hidden");
          quizOverlay.classList.add("hidden");
          resetGame();
          playBgm();
          animationId = requestAnimationFrame(loop);
        } catch (err) {
          console.error("게임 시작 오류:", err);
          alert("게임 시작 중 오류가 났어요. 콘솔 오류를 확인해줘!\n" + err.message);
        }
      }

      function applyBooster() {
        var types = ["shield", "slow", "double"];
        booster = types[Math.floor(Math.random() * types.length)];
        boosterUntil = performance.now() + 5000;
        if (booster === "shield") {
          player.classList.add("invincible");
          playSfx(quizSound);
          showToast("정답! 실수방어 5초");
        } else if (booster === "slow") {
          playSfx(quizSound);
          showToast("정답! 시간 여유 5초");
        } else {
          playSfx(quizSound);
          showToast("정답! 점수 2배 5초");
        }
      }
      function clearBooster() {
        booster = null;
        boosterUntil = 0;
        player.classList.remove("invincible");
        boosterText.textContent = "부스터 없음";
      }
      function openQuiz(mode) {
        var q = quizzes[Math.floor(Math.random() * quizzes.length)];
        paused = true;
        quizMode = mode;
        quizOverlay.classList.remove("hidden");
        choices.innerHTML = "";
        quizTitle.textContent = mode === "revive" ? "부활 폭염퀴즈" : "폭염 예방 퀴즈";
        quizQuestion.textContent = q.question;
        q.choices.forEach(function (choice, index) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choiceBtn";
          btn.textContent = String(index + 1) + ". " + choice;
          btn.addEventListener("click", function (event) {
            event.stopPropagation();
            answerQuiz(index === q.answer);
          });
          choices.appendChild(btn);
        });
      }
      function answerQuiz(correct) {
        quizOverlay.classList.add("hidden");
        if (quizMode === "booster") {
          if (correct) applyBooster();
          else showToast("오답! 부스터 없음");
          paused = false;
          resetDeadline();
          return;
        }
        if (quizMode === "revive") {
          if (correct) {
            revived = true;
            showToast("부활 성공!", 1500);
            paused = false;
            snapToCurrentStep();
            resetDeadline();
          } else {
            endGame();
          }
        }
      }
      function gameOver(reason) {
        if (!running || paused) return;
        if (!revived) {
          showToast(reason || "실패!", 900);
          openQuiz("revive");
        } else {
          endGame();
        }
      }
      function endGame() {
        running = false;
        paused = true;
        if (animationId !== null) cancelAnimationFrame(animationId);
        gameOverOverlay.classList.remove("hidden");
        finalText.innerHTML = "최종 점수 <b>" + Math.floor(score) + "</b>점<br>생존 시간 <b>" + seconds + "</b>초<br><br>닉네임은 랭킹에 공개되고, 사번은 포상 확인용으로만 기록됩니다.";
        nicknameInput.value = "";
        employeeInput.value = "";
        saveScoreBtn.disabled = false;
        saveScoreBtn.textContent = "기록하기";
        loadRanking();
      }
      function handleTimedQuiz() {
        if (seconds > 0 && seconds % 20 === 0 && lastQuizSecond !== seconds) {
          lastQuizSecond = seconds;
          openQuiz("booster");
          updateHud();
          return true;
        }
        return false;
      }
      function updateBooster(now) {
        var remain;
        var label;
        if (!booster) return;
        remain = Math.max(0, Math.ceil((boosterUntil - now) / 1000));
        label = booster === "shield" ? "실수방어" : booster === "slow" ? "시간여유" : "점수2배";
        boosterText.textContent = label + " " + remain + "초";
        if (now >= boosterUntil) clearBooster();
      }
      function beginMoveToNext(direction) {
        var expected = getNextDirection();
        var nxt = nextStep();
        var cur = currentStep();
        if (!running || paused || inputLocked || moving || !nxt || !cur) return;
        if (direction !== expected) {
          if (booster === "shield") {
            clearBooster();
            showToast("실수 방어!", 900);
            resetDeadline();
            return;
          }
          gameOver("방향 실수!");
          return;
        }
        inputLocked = true;
        moving = true;
        playSfx(jumpSound);
        moveStartTime = performance.now();
        playerStart.x = cur.x;
        playerStart.y = cur.y;
        playerTarget.x = nxt.x;
        playerTarget.y = nxt.y;
        currentIndex += 1;
        if (nxt.type === "bonus" && !nxt.collected) {
          score += booster === "double" ? 20 : 10;
          nxt.collected = true;
          nxt.type = "normal";
          nxt.el.classList.remove("bonus");
          nxt.el.innerHTML = "";
          playSfx(helmetSound);
          showToast("안전모 +10");
        }
        score += booster === "double" ? 2 : 1;
        targetCameraY = wrapH() * PLAYER_BASE_RATIO - nxt.y;
        resetDeadline();
        markCurrent();
        updateHud();
        updateStage();
        ensureMoreSteps();
      }
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function updateMovement(now) {
        if (!moving) return;
        var t = Math.min(1, (now - moveStartTime) / moveDuration);
        var e = easeOutCubic(t);
        var arc = Math.sin(e * Math.PI) * 18;
        var dir = playerTarget.x < playerStart.x ? -1 : 1;
        playerPos.x = playerStart.x + (playerTarget.x - playerStart.x) * e;
        playerPos.y = playerStart.y + (playerTarget.y - playerStart.y) * e - arc;
        cameraY = cameraY + (targetCameraY - cameraY) * 0.32;
        renderWorld();
        renderPlayer(1 + Math.sin(e * Math.PI) * 0.08, dir * 8);
        if (t >= 1) {
          moving = false;
          inputLocked = false;
          playerPos.x = playerTarget.x;
          playerPos.y = playerTarget.y;
          cameraY = targetCameraY;
          renderWorld();
          renderPlayer(1, 0);
          markCurrent();
        }
      }
      function updateTimer(now) {
        var remain = Math.max(0, stepDeadline - now);
        var ratio = remain / getStepTimeLimit();
        timerBar.style.transform = "scaleX(" + Math.max(0, Math.min(1, ratio)) + ")";
        if (remain <= 0 && !moving) gameOver("시간 초과!");
      }
      function loop(now) {
        if (!running) return;
        animationId = requestAnimationFrame(loop);
        if (paused) return;
        seconds = Math.floor((now - gameStartTime) / 1000);
        if (handleTimedQuiz()) return;
        updateBooster(now);
        updateMovement(now);
        updateTimer(now);
        updateHud();
      }

      function stopOverlayTouch(e) { e.stopPropagation(); }
      function handleStartButton(e) { e.stopPropagation(); startGame(e); }
      function handleSaveButton(e) { e.stopPropagation(); submitScoreRecord(e); }

      gameWrap.addEventListener("pointerdown", function (e) {
        var rect;
        var x;
        if (!running || paused || isAnyOverlayOpen()) return;
        rect = gameWrap.getBoundingClientRect();
        x = e.clientX - rect.left;
        beginMoveToNext(x < rect.width / 2 ? "left" : "right");
      });
      window.addEventListener("keydown", function (e) {
        if (!running || paused || isAnyOverlayOpen()) return;
        if (e.key === "ArrowLeft") beginMoveToNext("left");
        if (e.key === "ArrowRight") beginMoveToNext("right");
      });
      window.addEventListener("resize", function () {
        if (!running) return;
        generateMap();
        snapToCurrentStep();
      });

      startOverlay.addEventListener("pointerdown", stopOverlayTouch);
      quizOverlay.addEventListener("pointerdown", stopOverlayTouch);
      gameOverOverlay.addEventListener("pointerdown", stopOverlayTouch);
      nicknameInput.addEventListener("pointerdown", stopOverlayTouch);
      employeeInput.addEventListener("pointerdown", stopOverlayTouch);
      nicknameInput.addEventListener("click", stopOverlayTouch);
      employeeInput.addEventListener("click", stopOverlayTouch);
      nicknameInput.addEventListener("touchstart", stopOverlayTouch);
      employeeInput.addEventListener("touchstart", stopOverlayTouch);

      startBtn.addEventListener("pointerup", handleStartButton);
      restartBtn.addEventListener("pointerup", handleStartButton);
      saveScoreBtn.addEventListener("pointerup", handleSaveButton);
      startBtn.addEventListener("click", function (e) { e.stopPropagation(); });
      restartBtn.addEventListener("click", function (e) { e.stopPropagation(); });
      saveScoreBtn.addEventListener("click", function (e) { e.stopPropagation(); });

      bgmToggle.addEventListener("pointerup", toggleBgm);
      sfxToggle.addEventListener("pointerup", toggleSfx);

      function runSelfTests() {
        console.assert(Array.isArray(quizzes), "퀴즈 데이터는 배열이어야 합니다.");
        console.assert(quizzes.length > 0, "퀴즈 데이터가 있어야 합니다.");
        console.assert(quizzes.every(function (q) { return q.choices[q.answer] !== undefined; }), "모든 퀴즈의 정답 번호가 보기 범위 안이어야 합니다.");
        console.assert(player && player.getAttribute("src") === "assets/mirae.png", "캐릭터 이미지는 assets/mirae.png 경로를 사용해야 합니다.");
        console.assert(typeof submitScoreRecord === "function", "점수 기록 함수가 있어야 합니다.");
        console.assert(typeof startGame === "function", "게임 시작 함수가 있어야 합니다.");
        console.assert(typeof initSupabase === "function", "Supabase 초기화 함수가 있어야 합니다.");
      }

      try {
        updateSoundButtons();
        initSupabase();
        renderDecor("ground");
        loadRanking();
        runSelfTests();
      } catch (err) {
        console.error("초기화 오류:", err);
      }
    })();
  </script>
</body>
</html>
